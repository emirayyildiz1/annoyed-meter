<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gıcık-meter & Notlar</title>
    <style>
        :root {
            /* Varsayılan (Bad) Tema Renkleri */
            --primary-color: #6c5ce7;
            --farah-color: #ff9f43;
            --emir-color: #0984e3;
            --bg-color: #f8f9fc;
            --gauge-bg: #e0e0e0;
            --text-color: #2d3436;
        }

        /* Good Tema Renkleri */
        body.good-theme {
            --primary-color: #00b894;
            --farah-color: #00cec9;
            --emir-color: #6c5ce7;
            --bg-color: #e8f8f5;
            --text-color: #1e272e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.4s ease;
        }

        /* En Üstteki Ana Mod (Bad/Good) Switch'i */
        .master-switch-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2em;
            font-weight: bold;
            background: white;
            padding: 10px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        #themeBadLabel { color: #d63031; transition: 0.3s; }
        #themeGoodLabel { color: #888; transition: 0.3s; }

        input#themeToggle:checked ~ #themeGoodLabel { color: #00b894; }
        input#themeToggle:checked ~ #themeBadLabel { color: #888; }

        .theme-switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #d63031; transition: .4s; border-radius: 30px;
        }
        .theme-slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input#themeToggle:checked + .theme-slider { background-color: #00b894; }
        input#themeToggle:checked + .theme-slider:before { transform: translateX(30px); }


        .main-wrapper {
            display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 900px; width: 100%;
        }

        .card {
            background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 350px; position: relative; display: flex; flex-direction: column;
            transition: box-shadow 0.3s ease;
        }

        .meter-card { text-align: center; }

        h1, h2 { margin-top: 0; font-weight: 700; transition: color 0.3s; }
        h1 { font-size: 2em; }
        h2 { font-size: 1.5em; text-align: center; color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 10px;}

        /* Emir/Farah Switch'i */
        .top-switch-container {
            position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 10px; font-weight: bold;
        }

        .toggle-label { transition: color 0.3s; }

        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 30px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--farah-color); }
        input:checked + .slider:before { transform: translateX(24px); }

        #emirLabel { color: var(--emir-color); }
        #farahLabel { color: #888; }
        input:checked ~ #farahLabel { color: var(--farah-color); }
        input:checked ~ #emirLabel { color: #888; }

        .gauge-outer {
            width: 220px; height: 220px; margin: 40px auto 10px auto; border-radius: 50%;
            background: var(--gauge-bg); position: relative; display: flex;
            justify-content: center; align-items: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .gauge-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(var(--gauge-color, limegreen) 0%, var(--gauge-color, limegreen) 0%, var(--gauge-bg) 0% 100%);
            transition: background 0.3s ease; transform: rotate(-90deg);
        }

        .gauge-center {
            position: absolute; width: 170px; height: 170px; background-color: white;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .value-display { font-size: 3em; font-weight: 800; }
        .percent-sign { font-size: 0.5em; font-weight: 500; vertical-align: super; }

        .last-edit-display {
            font-size: 0.85em;
            color: #a4b0be;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .controls { margin-top: 10px; transition: opacity 0.3s ease; }
        .hidden { display: none !important; opacity: 0; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--farah-color); }
        p.info-text { color: #888; font-size: 0.85em; margin-top: 5px; }

        /* --- NOTLAR BÖLÜMÜ --- */
        .notes-list { flex-grow: 1; overflow-y: auto; max-height: 250px; margin-bottom: 15px; padding-right: 5px; }

        .note-item {
            background: #f1f2f6; padding: 12px; border-radius: 10px; margin-bottom: 10px;
            font-size: 0.9em; border-left: 4px solid var(--farah-color); word-wrap: break-word;
            display: flex; flex-direction: column;
            transition: border-color 0.3s ease;
        }

        .note-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .note-date { font-size: 0.75em; color: #888; }

        .delete-btn {
            background: transparent; color: #ff7675; border: none; padding: 0 5px;
            font-size: 1.2em; cursor: pointer; line-height: 1; border-radius: 50%;
        }
        .delete-btn:hover { background: transparent; color: #d63031; transform: scale(1.1); }

        .note-input-area { display: flex; flex-direction: column; gap: 10px; border-top: 2px solid #eee; padding-top: 15px; }

        textarea {
            width: 100%; height: 70px; padding: 10px; border: 1px solid #ddd;
            border-radius: 10px; resize: none; font-family: inherit; box-sizing: border-box;
        }
        textarea:focus { outline: none; border-color: var(--farah-color); }

        button.add-btn {
            background-color: var(--farah-color); color: white; border: none; padding: 10px;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s ease;
        }
        button.add-btn:hover { filter: brightness(1.1); }

    </style>
</head>
<body>

    <!-- ÜST TEMA (BAD/GOOD) SWITCH'İ -->
    <div class="master-switch-container">
        <span id="themeBadLabel">Bad Meter</span>
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="theme-slider"></span>
        </label>
        <span id="themeGoodLabel">Good Meter</span>
    </div>

    <div class="main-wrapper">
        <!-- SOL KART: GICIK-METER -->
        <div class="card meter-card">
            <div class="top-switch-container">
                <span class="toggle-label" id="emirLabel">Emir</span>
                <label class="switch">
                    <input type="checkbox" id="userToggle" checked>
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="farahLabel">Farah</span>
            </div>

            <h1 id="mainTitle">Bad Gıcık-meter</h1>

            <div class="gauge-outer">
                <div class="gauge-inner" id="gaugeBody"></div>
                <div class="gauge-center">
                    <div class="value-display" id="meterValue">0<span class="percent-sign">%</span></div>
                </div>
            </div>
            
            <!-- LAST EDIT TIME GÖSTERGESİ -->
            <div class="last-edit-display">
                last edit time : <span id="lastEditTime">--:--</span>
            </div>

            <div class="controls" id="controlSection">
                <label for="giciSlider">Değeri Ayarla:</label><br>
                <input type="range" id="giciSlider" min="0" max="100" value="0">
                <p class="info-text">Değeri güncellemek için kaydırın. (Anında güncellenir)</p>
            </div>

            <div class="controls hidden" id="viewSection">
                <p class="info-text">Emir modunda değer sadece görüntülenir.</p>
            </div>
        </div>

        <!-- SAĞ KART: NOTLAR -->
        <div class="card">
            <h2 id="notesTitle">Farah'ın Notları (Bad)</h2>
            
            <div class="notes-list" id="notesList">
                <p style="color:#aaa; text-align:center; margin-top:50px;">Yükleniyor...</p>
            </div>

            <div class="note-input-area" id="noteInputArea">
                <textarea id="noteInput" placeholder="Buraya bir not ekle..."></textarea>
                <button class="add-btn" id="addNoteBtn">Not Ekle</button>
            </div>
            
            <p class="info-text hidden" id="emirNoteInfo" style="text-align: center; margin-top: auto;">
                Emir sadece notları okuyabilir.
            </p>
        </div>
    </div>

    <!-- Firebase'i Modül Olarak Ekliyoruz -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Senin verdiğin Firebase Yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyD58o6kiEleUwhL_sesvsDGrIUXK4cxnVo",
            authDomain: "gicik-meter.firebaseapp.com",
            databaseURL: "https://gicik-meter-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gicik-meter",
            storageBucket: "gicik-meter.firebasestorage.app",
            messagingSenderId: "555775821271",
            appId: "1:555775821271:web:dfa2c50fafb549225d3792",
            measurementId: "G-FL0CDJK94Y"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // İki mod için Firebase Referans Yolları
        const dbPaths = {
            bad: {
                gicik: ref(db, 'giciklik_seviyesi'),      // Eski verilerin korundu
                notes: ref(db, 'farah_notlari'),          // Eski verilerin korundu
                time:  ref(db, 'last_edit_time_bad')      
            },
            good: {
                gicik: ref(db, 'good_giciklik_seviyesi'), // Yeni oluşturuldu
                notes: ref(db, 'good_notlari'),           // Yeni oluşturuldu
                time:  ref(db, 'last_edit_time_good')     // Yeni oluşturuldu
            }
        };

        // Uygulamanın anlık verilerini tutan obje
        let appData = {
            bad: { value: 0, notes: [], lastEdit: '--:--' },
            good: { value: 0, notes: [], lastEdit: '--:--' }
        };

        // Aktif Mod (Varsayılan olarak 'bad' başlar)
        let currentAppMode = 'bad'; 

        // DOM Elemanları
        const themeToggle = document.getElementById('themeToggle');
        const userToggle = document.getElementById('userToggle');
        const meterValue = document.getElementById('meterValue');
        const giciSlider = document.getElementById('giciSlider');
        const gaugeBody = document.getElementById('gaugeBody');
        const lastEditTime = document.getElementById('lastEditTime');
        const mainTitle = document.getElementById('mainTitle');
        const notesTitle = document.getElementById('notesTitle');
        const notesList = document.getElementById('notesList');
        const noteInputArea = document.getElementById('noteInputArea');
        const emirNoteInfo = document.getElementById('emirNoteInfo');
        const noteInput = document.getElementById('noteInput');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const controlSection = document.getElementById('controlSection');
        const viewSection = document.getElementById('viewSection');

        // --- 1. ARAYÜZ GÜNCELLEMELERİ ---
        function updateGaugeUI(value) {
            meterValue.innerHTML = `${value}<span class="percent-sign">%</span>`;
            giciSlider.value = value; 
            
            let color, glow;
            if (currentAppMode === 'bad') {
                // Kötü Mod Renkleri (Değer artarsa Kırmızıya döner)
                if (value < 30) { color = "#00b894"; glow = "0 0 10px rgba(0, 184, 148, 0.4)"; }
                else if (value < 70) { color = "#ffeaa7"; glow = "0 0 15px rgba(255, 234, 167, 0.6)"; }
                else { color = "#d63031"; glow = "0 0 25px rgba(214, 48, 49, 0.8)"; }
            } else {
                // İyi Mod Renkleri (Değer artarsa Yeşile/Maviye döner, düşük değer kötüdür)
                if (value < 30) { color = "#ff7675"; glow = "0 0 10px rgba(255, 118, 117, 0.4)"; }
                else if (value < 70) { color = "#74b9ff"; glow = "0 0 15px rgba(116, 185, 255, 0.6)"; }
                else { color = "#00b894"; glow = "0 0 25px rgba(0, 184, 148, 0.8)"; }
            }

            gaugeBody.style.setProperty('--gauge-color', color);
            gaugeBody.style.boxShadow = glow;
            gaugeBody.style.background = `conic-gradient(${color} 0%, ${color} ${value}%, var(--gauge-bg) ${value}% 100%)`;
        }

        function renderNotes() {
            notesList.innerHTML = '';
            const activeNotes = appData[currentAppMode].notes;

            if(!activeNotes || activeNotes.length === 0) {
                notesList.innerHTML = '<p style="color:#aaa; text-align:center; margin-top:50px;">Henüz hiç not yok.</p>';
                return;
            }

            const isFarahMode = userToggle.checked;

            activeNotes.forEach((note, index) => {
                const div = document.createElement('div');
                div.className = 'note-item';
                let deleteBtnHtml = isFarahMode ? `<button class="delete-btn" onclick="window.deleteNote(${index})">&times;</button>` : '';

                div.innerHTML = `
                    <div class="note-header">
                        <span class="note-date">${note.date}</span>
                        ${deleteBtnHtml}
                    </div>
                    <div class="note-text">${note.text}</div>
                `;
                notesList.appendChild(div);
            });
            notesList.scrollTop = notesList.scrollHeight;
        }

        function updateAllUI() {
            updateGaugeUI(appData[currentAppMode].value);
            renderNotes();
            lastEditTime.innerText = appData[currentAppMode].lastEdit;
        }


        // --- 2. FİREBASE DİNLEYİCİLERİ (İki mod için de çalışır) ---
        function attachListeners(mode) {
            onValue(dbPaths[mode].gicik, (snapshot) => {
                appData[mode].value = snapshot.val() || 0;
                if (currentAppMode === mode) updateGaugeUI(appData[mode].value);
            });
            onValue(dbPaths[mode].notes, (snapshot) => {
                appData[mode].notes = snapshot.val() || [];
                if (currentAppMode === mode) renderNotes();
            });
            onValue(dbPaths[mode].time, (snapshot) => {
                appData[mode].lastEdit = snapshot.val() || '--:--';
                if (currentAppMode === mode) lastEditTime.innerText = appData[mode].lastEdit;
            });
        }

        // Başlangıçta iki veritabanı dalını da dinlemeye başla
        attachListeners('bad');
        attachListeners('good');


        // --- 3. ETKİLEŞİMLER VE VERİ YAZMA ---
        
        // Gıcıklık Seviyesi Değiştiğinde
        giciSlider.addEventListener('input', function() {
            const val = this.value;
            set(dbPaths[currentAppMode].gicik, val); // İlgili moda değeri yaz
            
            // Saati hesapla ve kaydet
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            set(dbPaths[currentAppMode].time, timeStr); // İlgili modun saatini yaz
            
            updateGaugeUI(val);
        });

        // Not Eklendiğinde
        addNoteBtn.addEventListener('click', function() {
            const text = noteInput.value.trim();
            if(text !== '') {
                const now = new Date();
                const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} - ${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
                
                if (!appData[currentAppMode].notes) appData[currentAppMode].notes = [];
                
                appData[currentAppMode].notes.push({ text: text, date: timeString });
                set(dbPaths[currentAppMode].notes, appData[currentAppMode].notes); // İlgili modun notlarına yaz
                
                noteInput.value = '';
            }
        });

        // Not Silindiğinde
        window.deleteNote = function(index) {
            appData[currentAppMode].notes.splice(index, 1);
            set(dbPaths[currentAppMode].notes, appData[currentAppMode].notes);
        };

        // --- 4. MOD GEÇİŞLERİ (SWITCHLER) ---

        // Ana Tema (Bad/Good) Geçişi
        themeToggle.addEventListener('change', function() {
            currentAppMode = this.checked ? 'good' : 'bad';
            
            // CSS Sınıfını Değiştir (Temayı ayarlar)
            if (currentAppMode === 'good') {
                document.body.classList.add('good-theme');
                mainTitle.innerText = "Good Gıcık-meter";
                notesTitle.innerText = "Farah'ın Notları (Good)";
            } else {
                document.body.classList.remove('good-theme');
                mainTitle.innerText = "Bad Gıcık-meter";
                notesTitle.innerText = "Farah'ın Notları (Bad)";
            }
            
            // O Moda ait verileri ekrana bas
            updateAllUI();
        });

        // Emir/Farah Geçişi
        userToggle.addEventListener('change', function() {
            if (this.checked) {
                // Farah Modu
                controlSection.classList.remove('hidden');
                viewSection.classList.add('hidden');
                noteInputArea.classList.remove('hidden');
                emirNoteInfo.classList.add('hidden');
            } else {
                // Emir Modu
                controlSection.classList.add('hidden');
                viewSection.classList.remove('hidden');
                noteInputArea.classList.add('hidden');
                emirNoteInfo.classList.remove('hidden');
            }
            renderNotes();
        });

    </script>
</body>
</html>
